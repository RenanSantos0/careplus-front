<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarePlus+ V2</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="style.css">
  
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="app-bg vw-excellent relative min-h-[100dvh] overflow-x-hidden">

  <div aria-hidden="true" class="fixed inset-0 pointer-events-none z-0" id="particles-container">
    <div class="aurora-band b1"></div>
    <div class="aurora-band b2"></div>
    <div class="aurora-band b3"></div>
    </div>

  <div class="fixed top-4 right-4 z-50">
    <button class="w-10 h-10 rounded-full border border-[var(--card-border)] overflow-hidden glass shadow-lg">
      <img src="https://ui-avatars.com/api/?name=Marcos&background=random" class="w-full h-full object-cover" alt="Perfil">
    </button>
  </div>

  <main class="relative z-10 min-h-[100dvh] py-[clamp(24px,5vw,56px)] px-[clamp(16px,5vw,48px)] pb-32 max-w-[720px] mx-auto">
    
    <header class="mb-2 mt-4">
      <div class="text-[0.6rem] font-bold tracking-[0.22em] uppercase text-[var(--accent)] mb-1">
        Vitals Weather — Excelente
      </div>
      <h1 class="text-[clamp(1.6rem,5vw,2.2rem)] font-extrabold text-[var(--text-primary)] tracking-[-0.03em] leading-[1.1]">
        Olá, Marcos
      </h1>
      <p class="text-[0.82rem] text-[var(--text-muted)] mt-1 capitalize" id="data-atual"></p>
    </header>

    <div class="flex justify-center py-6 mb-6 relative">
      <div class="flex flex-col items-center panda-float z-10">
        <div class="glass p-3 rounded-2xl mb-4 text-sm text-[var(--text-primary)] max-w-[220px] text-center border border-[var(--card-border)] shadow-lg">
          Seus sinais vitais estão ótimos hoje! Continue assim.
        </div>
        <div class="w-24 h-24 rounded-full bg-[var(--card-bg)] border-2 border-[var(--accent)] flex items-center justify-center viz-glow backdrop-blur-md">
          <i data-lucide="smile" class="text-[var(--accent)] w-12 h-12"></i>
        </div>
      </div>
    </div>

    <section aria-label="Estatísticas" class="grid gap-3 mb-7 grid-cols-2 sm:grid-cols-4">
      <div class="glass rounded-lg p-4 flex flex-col items-center gap-1 hover:border-[var(--accent-soft)] transition-colors">
        <i data-lucide="star" class="text-[var(--accent)] mb-1" width="20"></i>
        <div class="font-display text-2xl leading-none">100</div>
        <div class="text-[0.58rem] font-bold tracking-[0.1em] uppercase text-[var(--text-muted)]">Pontos</div>
      </div>
      <div class="glass rounded-lg p-4 flex flex-col items-center gap-1 hover:border-[var(--accent-soft)] transition-colors">
        <i data-lucide="zap" class="text-[var(--accent)] mb-1" width="20"></i>
        <div class="font-display text-2xl leading-none">3<span class="text-[0.62rem] ml-0.5">d</span></div>
        <div class="text-[0.58rem] font-bold tracking-[0.1em] uppercase text-[var(--text-muted)]">Streak</div>
      </div>
      <div class="glass rounded-lg p-4 flex flex-col items-center gap-1 hover:border-[var(--accent-soft)] transition-colors">
        <i data-lucide="award" class="text-[var(--accent)] mb-1" width="20"></i>
        <div class="font-display text-2xl leading-none">1</div>
        <div class="text-[0.58rem] font-bold tracking-[0.1em] uppercase text-[var(--text-muted)]">Badges</div>
      </div>
      <div class="glass rounded-lg p-4 flex flex-col items-center gap-1 hover:border-[var(--accent-soft)] transition-colors">
        <i data-lucide="check-circle-2" class="text-[var(--accent)] mb-1" width="20"></i>
        <div class="font-display text-2xl leading-none">2/3</div>
        <div class="text-[0.58rem] font-bold tracking-[0.1em] uppercase text-[var(--text-muted)]">Missões</div>
      </div>
    </section>

    <section aria-label="Sinais vitais" class="mb-7">
      <div class="text-[0.6rem] font-bold tracking-[0.22em] uppercase text-[var(--text-muted)] mb-2">
        Sinais Vitais
      </div>
      <div class="glass rounded-lg p-[18px] flex items-center justify-between gap-2">
        <div class="flex-1 flex flex-col items-center gap-1.5">
          <i data-lucide="heart-pulse" class="text-[var(--accent)]" width="17"></i>
          <div class="font-display text-2xl leading-none text-[var(--text-primary)]">
            72<span class="text-[0.62rem] font-semibold text-[var(--text-muted)] ml-0.5">bpm</span>
          </div>
          <div class="text-[0.58rem] font-bold tracking-[0.1em] uppercase text-[var(--text-muted)]">Batimentos</div>
        </div>
        <div class="flex-1 flex flex-col items-center gap-1.5 border-l border-[var(--card-border)]">
          <i data-lucide="wind" class="text-[var(--accent)]" width="17"></i>
          <div class="font-display text-2xl leading-none text-[var(--text-primary)]">
            98<span class="text-[0.62rem] font-semibold text-[var(--text-muted)] ml-0.5">%</span>
          </div>
          <div class="text-[0.58rem] font-bold tracking-[0.1em] uppercase text-[var(--text-muted)]">SpO₂</div>
        </div>
        <div class="flex-1 flex flex-col items-center gap-1.5 border-l border-[var(--card-border)]">
          <i data-lucide="thermometer" class="text-[var(--accent)]" width="17"></i>
          <div class="font-display text-2xl leading-none text-[var(--text-primary)]">
            36.5<span class="text-[0.62rem] font-semibold text-[var(--text-muted)] ml-0.5">°C</span>
          </div>
          <div class="text-[0.58rem] font-bold tracking-[0.1em] uppercase text-[var(--text-muted)]">Temp</div>
        </div>
      </div>
    </section>

    <section aria-labelledby="missoes-title" class="mb-7">
      <div class="flex justify-between items-center mb-3.5">
        <div>
          <div class="text-[0.6rem] font-bold tracking-[0.22em] uppercase text-[var(--text-muted)] mb-0.5">Hoje</div>
          <h2 id="missoes-title" class="text-base font-extrabold text-[var(--text-primary)] tracking-[-0.01em]">Missões do Dia</h2>
        </div>
        <a href="#" class="flex items-center gap-1 text-[0.72rem] font-bold text-[var(--accent)] no-underline tracking-[0.04em]">
          Adicionar <i data-lucide="arrow-right" width="14"></i>
        </a>
      </div>

      <div class="grid gap-3 grid-cols-1 sm:grid-cols-2 md:grid-cols-3">
        <div class="glass rounded-lg p-[18px] relative overflow-hidden flex flex-col">
          <div class="flex justify-between items-start mb-4">
            <div class="flex items-center gap-2.5">
              <div class="w-8 h-8 rounded-full flex items-center justify-center accent-bg text-[var(--accent)]">
                <i data-lucide="footprints" width="16"></i>
              </div>
              <span class="font-bold text-[0.9rem] text-[var(--text-primary)]">Passos</span>
            </div>
            <span class="text-[0.65rem] font-bold px-2 py-1 rounded-full bg-[rgba(194,163,107,0.15)] text-[var(--accent-reward)]">
              +100 pts
            </span>
          </div>
          <div class="mt-auto">
            <div class="flex justify-between text-[0.7rem] font-semibold text-[var(--text-muted)] mb-1.5">
              <span class="text-[var(--text-primary)]">7.500</span>
              <span>10.000</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: 75%"></div>
            </div>
          </div>
        </div>

        <div class="glass rounded-lg p-[18px] relative overflow-hidden flex flex-col">
          <div class="flex justify-between items-start mb-4">
            <div class="flex items-center gap-2.5">
              <div class="w-8 h-8 rounded-full flex items-center justify-center accent-bg text-[var(--accent)]">
                <i data-lucide="droplet" width="16"></i>
              </div>
              <span class="font-bold text-[0.9rem] text-[var(--text-primary)]">Água</span>
            </div>
            <span class="text-[0.65rem] font-bold px-2 py-1 rounded-full bg-[rgba(194,163,107,0.15)] text-[var(--accent-reward)]">
              +40 pts
            </span>
          </div>
          <div class="mt-auto">
            <div class="flex justify-between text-[0.7rem] font-semibold text-[var(--text-muted)] mb-1.5">
              <span class="text-[var(--text-primary)]">1.8</span>
              <span>3 L</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width: 60%"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <nav class="fixed bottom-0 left-0 w-full glass border-t border-[var(--card-border)] z-50 pt-2 pb-[calc(env(safe-area-inset-bottom)+8px)]">
    <div class="max-w-[720px] mx-auto flex justify-around items-center h-14 px-4">
      <a href="#" class="flex flex-col items-center gap-1 text-[var(--accent)] relative">
        <div class="absolute -top-3 w-1 h-1 rounded-full bg-[var(--accent)]" style="box-shadow: 0 0 8px var(--accent-glow)"></div>
        <i data-lucide="home" width="22"></i>
        <span class="text-[0.6rem] font-bold">Início</span>
      </a>
      <a href="src/pages/rewards.html" class="flex flex-col items-center gap-1 text-[var(--text-muted)] hover:text-[var(--text-primary)] transition-colors">
        <i data-lucide="gift" width="22"></i>
        <span class="text-[0.6rem] font-bold">Prêmios</span>
      </a>
      <a href="#" class="flex flex-col items-center gap-1 text-[var(--text-muted)] hover:text-[var(--text-primary)] transition-colors">
        <i data-lucide="settings" width="22"></i>
        <span class="text-[0.6rem] font-bold">Ajustes</span>
      </a>
    </div>
  </nav>

  <script src="script.js"></script>
</body>
</html>
